<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#006B3F">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="manifest" href="../manifest.json">
  <title>KudiSave</title>
  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- Cal Sans -->
  <style>@font-face { font-family: 'Cal Sans'; src: url('https://cdn.jsdelivr.net/npm/cal-sans@1.0.1/fonts/CalSans-SemiBold.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }</style>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #006B3F;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #006B3F;
      padding: max(28px, env(safe-area-inset-top)) 24px max(28px, env(safe-area-inset-bottom));
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.1), transparent 34%);
    }

    .splash-container {
      text-align: center;
      width: min(100%, 360px);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.65s ease both;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px) scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    .splash-logo {
      width: 172px;
      height: 172px;
      display: grid;
      place-items: center;
      margin-bottom: 24px;
      border-radius: 44px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        0 22px 48px rgba(0, 31, 20, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    .splash-logo-img {
      width: 136px;
      height: auto;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.18));
    }

    .splash-title {
      font-family: 'Cal Sans', sans-serif;
      font-size: clamp(40px, 11vw, 56px);
      font-weight: 600;
      color: white;
      margin-bottom: 10px;
      letter-spacing: 0;
      line-height: 1;
      text-shadow: 0 8px 28px rgba(0, 38, 24, 0.22);
    }

    .splash-subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.86);
      margin-bottom: 34px;
      font-weight: 600;
      line-height: 1.5;
    }

    .splash-version {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    .splash-loader {
      width: min(220px, 72vw);
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.12);
    }

    .splash-progress {
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffffff, #fcd116, #ffffff);
      animation: load 1.15s ease-in-out infinite;
    }

    @keyframes load {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(250%); }
    }

    @media (max-width: 380px) {
      .splash-logo {
        width: 148px;
        height: 148px;
        border-radius: 36px;
      }

      .splash-logo-img {
        width: 118px;
      }

      .splash-subtitle {
        font-size: 15px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }


  </style>
</head>
<body>
  <div class="splash-container">
    <div class="splash-logo"><img src="../logowhite.png" alt="KudiSave" class="splash-logo-img"></div>
    <h1 class="splash-title">KudiSave</h1>
    <p class="splash-subtitle">Your Personal Finance Companion</p>
    <p class="splash-version">v1.0</p>
    <div class="splash-loader">
      <div class="splash-progress"></div>
    </div>
  </div>

  <script>
    // Check if user has completed onboarding and is logged in
    const hasCompletedOnboarding = localStorage.getItem('onboardingComplete');
    const isLoggedIn = localStorage.getItem('token');
    
    // Mark splash screen as shown
    sessionStorage.setItem('splashShown', 'true');

    function getRedirectUrl() {
      if (isLoggedIn) {
        return 'pages/dashboard.html';
      } else if (!hasCompletedOnboarding) {
        return '../pages/onboarding.html';
      } else {
        return '../index.html';
      }
    }

    // Wait 2.5 seconds then redirect based on user state
    setTimeout(() => {
      window.location.href = getRedirectUrl();
    }, 2500);
    
    // Allow skip with tap/click
    document.addEventListener('click', skipSplash);
    document.addEventListener('touchstart', skipSplash);
    
    let skipped = false;
    function skipSplash() {
      if (!skipped) {
        skipped = true;
        window.location.href = getRedirectUrl();
      }
    }
  </script>
</body>
</html>
