  <style>
    /* ===== Modern Header for Achievements ===== */
    .mtn-header {
      background: linear-gradient(160deg, var(--primary-color) 0%, #064a52 40%, #033036 80%, #021f23 100%);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding-top: env(safe-area-inset-top, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      overflow: hidden;
    }

    .mtn-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }

    .mtn-header::after {
      content: '';
      position: absolute;
      bottom: -40%;
      left: -15%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
      border-radius: 50%;
    }

    .mtn-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px 0 16px;
      position: relative;
      z-index: 1;
    }

    .mtn-back-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
    }

    .mtn-back-btn:active {
      transform: scale(0.92);
      background: rgba(255,255,255,0.18);
    }

    .mtn-back-btn i {
      width: 18px;
      height: 18px;
    }

    .mtn-page-title {
      font-size: 17px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.3px;
    }

    .mtn-topbar-spacer {
      width: 38px;
    }

    /* Level/XP section inside header */
    .mtn-level-section {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 16px 24px 16px;
      position: relative;
      z-index: 1;
    }

    .mtn-level-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border: 1px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .mtn-level-info {
      flex: 1;
      min-width: 0;
    }

    .mtn-level-name {
      font-size: 20px;
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }

    .mtn-xp-text {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
      font-weight: 500;
    }

    .mtn-xp-bar {
      margin-top: 8px;
      background: rgba(255,255,255,0.12);
      border-radius: 8px;
      height: 6px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.15);
    }

    .mtn-xp-fill {
      height: 100%;
      background: linear-gradient(90deg, #00e676, #69f0ae);
      border-radius: 8px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0, 230, 118, 0.3);
    }

    .mtn-xp-fill::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }

    /* Stats row inside header */
    .mtn-stats-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 0 16px 20px 16px;
      position: relative;
      z-index: 1;
    }

    .mtn-stat {
      text-align: center;
    }

    .mtn-stat-value {
      font-size: 20px;
      font-weight: 700;
      color: white;
    }

    .mtn-stat-label {
      font-size: 10px;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .mtn-header-curve {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 10px;
      background: var(--bg-primary, #f5f6fa);
      border-radius: 16px 16px 0 0;
      opacity: 0.35;
    }
    [data-theme="dark"] .mtn-header-curve { background: var(--bg-primary, #0f172a); opacity: 0.25; }

    .mtn-header-spacer {
      height: auto;
      min-height: calc(245px + env(safe-area-inset-top, 0px));
      display: contents;
    }

    body {
      padding-top: 0 !important;
    }

    body {
      padding-top: 0 !important;
    }

    .category-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .category-tab {
      padding: 10px 16px;
      border: none;
      background: var(--card-bg);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 2px solid transparent;
    }

    .category-tab:hover {
      background: rgba(3, 48, 54, 0.1);
      transform: translateY(-1px);
    }

    .category-tab.active {
      background: linear-gradient(135deg, var(--primary-color), #0b737d);
      color: white;
      border-color: var(--primary-color);
      box-shadow: 0 2px 8px rgba(3, 48, 54, 0.3);
    }

    .achievement-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 100px;
    }

    .achievement-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--border-color);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .achievement-card::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      width: var(--progress, 0%);
      background: linear-gradient(90deg, var(--primary-color), #0b737d);
      transition: width 0.8s ease;
    }

    .achievement-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }

    .achievement-card.locked {
      opacity: 0.7;
    }

    .achievement-card.earned {
      border-color: var(--primary-color);
      background: linear-gradient(135deg, rgba(3, 48, 54, 0.08), rgba(3, 48, 54, 0.03));
      box-shadow: 0 2px 8px rgba(3, 48, 54, 0.15);
    }

    .achievement-card.earned::before {
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, #FFD700, #FFA500);
    }

    .achievement-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .achievement-card.earned .achievement-icon {
      background: linear-gradient(135deg, var(--primary-color), #0b737d);
      animation: iconShine 2s infinite;
      box-shadow: 0 4px 12px rgba(3, 48, 54, 0.4);
    }

    @keyframes iconShine {
      0%, 100% { box-shadow: 0 4px 12px rgba(3, 48, 54, 0.4); }
      50% { box-shadow: 0 4px 20px rgba(3, 48, 54, 0.6), 0 0 30px rgba(3, 48, 54, 0.3); }
    }

    .achievement-card.locked .achievement-icon {
      filter: grayscale(100%);
      opacity: 0.5;
    }

    .achievement-info {
      flex: 1;
    }

    .achievement-name {
      font-weight: 700;
      color: var(--text-primary);
      font-size: 14px;
      margin-bottom: 4px;
    }

    .achievement-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.3;
    }

    .achievement-xp {
      display: inline-block;
      background: rgba(3, 48, 54, 0.15);
      color: var(--primary-color);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .achievement-card.earned .achievement-xp {
      background: var(--primary-color);
      color: white;
    }

    .earned-badge {
      display: none;
    }

    .progress-ring {
      display: none;
    }

    .secret-badge {
      display: none;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    /* Compact page header - matches the Transactions header */
    .mtn-header {
      background: var(--primary-gradient, linear-gradient(135deg, #033036 0%, #064a52 46%, #0b737d 100%)) !important;
      box-shadow: 0 12px 28px rgba(3,48,54,0.18) !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 100 !important;
      padding-top: env(safe-area-inset-top, 0px) !important;
      padding-left: env(safe-area-inset-left, 0px) !important;
      padding-right: env(safe-area-inset-right, 0px) !important;
      overflow: hidden !important;
    }
    .mtn-header::before,
    .mtn-header::after,
    .mtn-header-shimmer,
    .header-particles,
    .mtn-info-section,
    .header-balance,
    .mtn-header-curve {
      display: none !important;
    }
    .mtn-topbar {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      padding: 14px 20px 8px !important;
      position: relative !important;
      z-index: 1 !important;
    }
    .mtn-back-btn,
    .mtn-add-btn {
      width: 46px !important;
      height: 46px !important;
      border-radius: 50% !important;
      background: rgba(255,255,255,0.14) !important;
      border: 1px solid rgba(255,255,255,0.16) !important;
      color: #ffffff !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12) !important;
      backdrop-filter: blur(10px) !important;
      -webkit-backdrop-filter: blur(10px) !important;
      text-decoration: none !important;
    }
    .mtn-back-btn:active,
    .mtn-add-btn:active {
      transform: scale(0.94) !important;
      background: rgba(255,255,255,0.22) !important;
    }
    .mtn-back-btn i,
    .mtn-add-btn i {
      width: 20px !important;
      height: 20px !important;
    }
    .mtn-page-title {
      font-size: 18px !important;
      font-weight: 800 !important;
      color: #ffffff !important;
      letter-spacing: -0.3px !important;
      text-align: center !important;
      line-height: 1.2 !important;
    }
    .mtn-topbar-spacer {
      width: 46px !important;
      height: 46px !important;
      flex-shrink: 0 !important;
    }
    .mtn-header-spacer {
      display: block !important;
      height: calc(78px + env(safe-area-inset-top, 0px)) !important;
      min-height: 0 !important;
      width: 100% !important;
    }

    .main-content {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 12px 0 120px !important;
    }

    .achievement-overview {
      background: linear-gradient(160deg, var(--primary-color) 0%, #064a52 58%, #0b737d 100%);
      border-radius: 24px;
      padding: 18px;
      color: #ffffff;
      box-shadow: 0 18px 44px rgba(3, 48, 54, 0.18);
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .overview-top {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .level-emblem {
      width: 62px;
      height: 62px;
      border-radius: 20px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 28px rgba(0,0,0,0.16);
    }

    .level-emblem i {
      width: 30px;
      height: 30px;
    }

    .overview-kicker {
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.68);
      margin-bottom: 3px;
    }

    .overview-level-name {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.4px;
      line-height: 1.1;
    }

    .overview-xp-text {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.72);
      margin-top: 6px;
    }

    .overview-xp-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      overflow: hidden;
      margin-top: 14px;
      position: relative;
      z-index: 1;
    }

    .overview-xp-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #facc15, #34d399);
      width: 0%;
      transition: width 0.5s ease;
    }

    .overview-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 16px;
      position: relative;
      z-index: 1;
    }

    .overview-stat {
      border-radius: 16px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 11px 8px;
      text-align: center;
    }

    .overview-stat-value {
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
    }

    .overview-stat-label {
      margin-top: 4px;
      color: rgba(255,255,255,0.72);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.35px;
    }

    .category-tabs {
      position: sticky;
      top: calc(68px + env(safe-area-inset-top, 0px));
      z-index: 15;
      background: rgba(245, 246, 250, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 10px 0;
      margin-bottom: 10px;
      scrollbar-width: none;
    }

    [data-theme="dark"] .category-tabs {
      background: rgba(15, 23, 42, 0.86);
    }

    .category-tabs::-webkit-scrollbar {
      display: none;
    }

    .category-tab {
      border-radius: 999px;
      border: 1px solid var(--border-color);
      box-shadow: 0 8px 18px rgba(17,24,39,0.04);
    }

    .category-tab i {
      width: 15px;
      height: 15px;
    }

    .achievement-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding-bottom: 0;
    }

    .achievement-card {
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.055);
    }

    .achievement-card.earned {
      border-color: rgba(234, 179, 8, 0.4);
      background: linear-gradient(135deg, rgba(250,204,21,0.12), rgba(3,48,54,0.035));
      box-shadow: 0 12px 30px rgba(234,179,8,0.12);
    }

    .achievement-card.locked {
      opacity: 1;
    }

    .achievement-card.locked .achievement-info {
      opacity: 0.72;
    }

    .achievement-icon {
      width: 52px;
      height: 52px;
      border-radius: 17px;
      color: var(--primary-color);
      background: rgba(11, 115, 125, 0.1);
    }

    .achievement-icon i {
      width: 24px;
      height: 24px;
    }

    .achievement-card.earned .achievement-icon {
      background: linear-gradient(135deg, #eab308, #facc15);
      color: #ffffff;
      animation: none;
      box-shadow: 0 10px 22px rgba(234,179,8,0.28);
    }

    .achievement-card.locked .achievement-icon {
      filter: none;
      opacity: 1;
      color: var(--text-muted);
      background: var(--bg-secondary);
    }

    .achievement-info {
      min-width: 0;
    }

    .achievement-name {
      font-size: 15px;
      font-weight: 850;
      letter-spacing: -0.15px;
    }

    .achievement-desc {
      font-size: 12px;
      line-height: 1.45;
    }

    .achievement-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    .achievement-state {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.35px;
    }

    .achievement-state i {
      width: 13px;
      height: 13px;
    }

    .achievement-card.earned .achievement-state {
      color: #ca8a04;
    }

    .achievement-xp {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 11px;
      background: rgba(11, 115, 125, 0.1);
    }

    .achievement-xp i {
      width: 13px;
      height: 13px;
    }

    .achievement-card.earned .achievement-xp {
      background: rgba(234, 179, 8, 0.15);
      color: #a16207;
    }

    .empty-state {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 22px;
      padding: 36px 18px;
    }

    .empty-state i {
      width: 34px;
      height: 34px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .achievement-unlock-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .achievement-unlock-card {
      width: min(340px, 100%);
      border-radius: 26px;
      padding: 26px 22px;
      text-align: center;
      background: var(--card-bg);
      color: var(--text-primary);
      box-shadow: 0 30px 90px rgba(0,0,0,0.25);
      border: 1px solid var(--border-color);

      height: 70px;
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eab308, #facc15);
      color: #ffffff;
      box-shadow: 0 16px 34px rgba(234,179,8,0.28);
      margin-bottom: 16px;
    }

    .achievement-unlock-icon i {
      width: 34px;
      height: 34px;
    }

    .achievement-unlock-kicker {
      font-size: 11px;
      font-weight: 900;
      color: var(--primary-color);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .achievement-unlock-card h2 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.3px;
      margin: 0 0 8px;
    }

    .achievement-unlock-card p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin: 0;
    }

    .achievement-unlock-xp {
      display: inline-flex;
      margin-top: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(234, 179, 8, 0.16);
      color: #a16207;
      font-size: 13px;
      font-weight: 900;
    }

    @media (min-width: 720px) {
      .achievement-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 1040px) {
      .main-content {
        width: min(1120px, calc(100vw - 80px));
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        gap: 18px 22px;
        align-items: start;
      }

      .achievement-overview {
        grid-column: 1;
        position: sticky;
        top: calc(92px + env(safe-area-inset-top, 0px));
        margin-bottom: 0;
      }

      .category-tabs,
      .achievement-grid {
        grid-column: 2;
      }

      .category-tabs {
        top: calc(76px + env(safe-area-inset-top, 0px));
      }
    }

<body>
  <!-- MTN-Style Header -->
  <header class="mtn-header">
    <div class="mtn-topbar">
      <a href="dashboard.html" class="mtn-back-btn">
        <i data-lucide="arrow-left"></i>
      </a>
      <span class="mtn-page-title">Achievements</span>
      <div class="mtn-topbar-spacer"></div>
    </div>

    <div class="mtn-header-curve"></div>
  </header>

  <!-- Header Spacer -->
  <div class="mtn-header-spacer"></div>

  <!-- Main Content -->
  <main class="main-content">
    <section class="achievement-overview" aria-label="Achievement progress">
      <div class="overview-top">
        <div class="level-emblem" id="levelBadge"><i data-lucide="trophy"></i></div>
        <div>
          <div class="overview-kicker">Current level</div>
          <div class="overview-level-name" id="levelTitle">Beginner</div>
          <div class="overview-xp-text">
            <span id="currentXP">0</span> / <span id="nextLevelXP">100</span> XP
          </div>
        </div>
      </div>
      <div class="overview-xp-bar">
        <div class="overview-xp-fill" id="xpProgressFill" style="width: 0%"></div>
      </div>
      <div class="overview-stats">
        <div class="overview-stat">
          <div class="overview-stat-value" id="earnedCount">0</div>
          <div class="overview-stat-label">Earned</div>
        </div>
        <div class="overview-stat">
          <div class="overview-stat-value" id="totalCount">0</div>
          <div class="overview-stat-label">Total</div>
        </div>
        <div class="overview-stat">
          <div class="overview-stat-value" id="completionRate">0%</div>
          <div class="overview-stat-label">Complete</div>
        </div>
      </div>
    </section>

    <!-- Category Tabs -->
    <div class="category-tabs">
      <button class="category-tab active" data-category="all" onclick="filterCategory('all')"><i data-lucide="layout-grid"></i> All</button>
      <button class="category-tab" data-category="milestone" onclick="filterCategory('milestone')"><i data-lucide="flag"></i> Milestones</button>
      <button class="category-tab" data-category="savings" onclick="filterCategory('savings')"><i data-lucide="piggy-bank"></i> Savings</button>
      <button class="category-tab" data-category="spending" onclick="filterCategory('spending')"><i data-lucide="receipt"></i> Spending</button>
      <button class="category-tab" data-category="streak" onclick="filterCategory('streak')"><i data-lucide="flame"></i> Streaks</button>
      <button class="category-tab" data-category="challenge" onclick="filterCategory('challenge')"><i data-lucide="swords"></i> Challenges</button>
    </div>

    <!-- Achievements Grid -->
    <div class="achievement-grid" id="achievementsGrid">
      <!-- Achievements loaded here -->
    </div>
  </main>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>

    lucide.createIcons();
    utils.requireAuth();

    function logout() { api.logout(); }

    let allAchievements = [];
    let currentCategory = 'all';

    const achievementIcons = {
      first_expense: 'receipt-text',
      expense_master: 'badge-dollar-sign',
      budget_keeper: 'chart-no-axes-column',
      savings_starter: 'sprout',
      savings_champion: 'piggy-bank',
      goal_setter: 'target',
      goal_crusher: 'trophy',
      streak_starter: 'flame',
      streak_master: 'zap',
      challenge_winner: 'medal',
      early_bird: 'sunrise',
      night_owl: 'moon-star',
      consistent: 'calendar-check',
      frugal: 'coins',
      investor: 'trending-up',
      default: 'award'
    };

    const levels = [
      { name: 'Beginner', icon: 'sprout', minXP: 0 },
      { name: 'Saver', icon: 'piggy-bank', minXP: 100 },
      { name: 'Budgeter', icon: 'chart-no-axes-column', minXP: 500 },
      { name: 'Investor', icon: 'trending-up', minXP: 1000 },
      { name: 'Expert', icon: 'graduation-cap', minXP: 2500 },
      { name: 'Master', icon: 'crown', minXP: 5000 },
      { name: 'Legend', icon: 'trophy', minXP: 10000 }
    ];

    document.addEventListener('DOMContentLoaded', loadAchievements);

    async function loadAchievements() {
      try {
        const achievementsGrid = document.getElementById('achievementsGrid');
        if (achievementsGrid) {
          achievementsGrid.innerHTML = '<div class="empty-state"><i data-lucide="loader-circle"></i><p>Loading achievements...</p></div>';
          lucide.createIcons({ node: achievementsGrid });
        }

        const results = await Promise.allSettled([
          api.get('/achievements'),
          api.get('/achievements/stats')
        ]);

        const achievementsRes = results[0].status === 'fulfilled' ? results[0].value : null;
        const statsRes = results[1].status === 'fulfilled' ? results[1].value : null;

        if (achievementsRes && achievementsRes.success) {
          allAchievements = Array.isArray(achievementsRes.data) ? achievementsRes.data : [];
          allAchievements.forEach(function(achievement) {
            achievement.earned = Boolean(achievement.earned || achievement.is_earned);
          });
        } else {
          allAchievements = [];
        }

        renderAchievements();

        if (statsRes && statsRes.success) {
          updateStats(statsRes.data || {});
          updateLevel(Number(statsRes.data.total_xp || statsRes.data.total_xp_from_achievements || 0));
        } else {
          updateStats({ earned_count: allAchievements.filter(function(a) { return a.earned; }).length, total_achievements: allAchievements.length });
          updateLevel(allAchievements.filter(function(a) { return a.earned; }).reduce(function(sum, a) { return sum + Number(a.xp_reward || 0); }, 0));
        }
      } catch (error) {
        console.error('Error loading achievements:', error);
        renderAchievementsError();
      }
    }

    function updateStats(stats) {
      const earned = Number(stats.earned_count || stats.earned_achievements || 0);
      const total = Number(stats.total_achievements || allAchievements.length || 0);
      const rate = total > 0 ? Math.round((earned / total) * 100) : 0;
      document.getElementById('earnedCount').textContent = earned;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('completionRate').textContent = rate + '%';
    }

    function updateLevel(totalXP) {
      let currentLevel = levels[0];
      let nextLevel = levels[1];

      for (let i = levels.length - 1; i >= 0; i--) {
        if (totalXP >= levels[i].minXP) {
          currentLevel = levels[i];
          nextLevel = levels[i + 1] || levels[i];
          break;
        }
      }

      const levelBadge = document.getElementById('levelBadge');
      levelBadge.innerHTML = '<i data-lucide="' + currentLevel.icon + '"></i>';
      document.getElementById('levelTitle').textContent = currentLevel.name;
      document.getElementById('currentXP').textContent = totalXP.toLocaleString();
      document.getElementById('nextLevelXP').textContent = nextLevel.minXP.toLocaleString();

      const progress = nextLevel.minXP > currentLevel.minXP
        ? ((totalXP - currentLevel.minXP) / (nextLevel.minXP - currentLevel.minXP)) * 100
        : 100;
      document.getElementById('xpProgressFill').style.width = Math.min(100, Math.max(0, progress)) + '%';
      lucide.createIcons({ node: levelBadge });
    }

    function filterCategory(category) {
      currentCategory = category;
      document.querySelectorAll('.category-tab').forEach(function(tab) {
        tab.classList.toggle('active', tab.dataset.category === category);
      });
      renderAchievements();
    }

    function renderAchievements() {
      const container = document.getElementById('achievementsGrid');
      let filtered = allAchievements.slice();
      if (currentCategory !== 'all') {
        filtered = filtered.filter(function(achievement) { return achievement.category === currentCategory; });
      }

      filtered.sort(function(a, b) {
        if (a.earned && !b.earned) return -1;
        if (!a.earned && b.earned) return 1;
        return Number(b.xp_reward || 0) - Number(a.xp_reward || 0);
      });

      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><i data-lucide="award"></i><p>No achievements in this category yet.</p></div>';
        lucide.createIcons({ node: container });
        return;
      }

      container.innerHTML = filtered.map(function(achievement) {
        const isSecret = achievement.is_secret && !achievement.earned;
        const name = isSecret ? 'Secret achievement' : escapeHtml(achievement.name);
        const description = isSecret ? 'Keep using KudiSave to reveal this reward.' : escapeHtml(achievement.description);
        const stateIcon = achievement.earned ? 'check-circle-2' : 'lock';
        const stateText = achievement.earned ? 'Earned' : 'Locked';
        return '<div class="achievement-card ' + (achievement.earned ? 'earned' : 'locked') + '">' +
          '<div class="achievement-icon"><i data-lucide="' + getIcon(achievement) + '"></i></div>' +
          '<div class="achievement-info">' +
            '<div class="achievement-name">' + name + '</div>' +
            '<div class="achievement-desc">' + description + '</div>' +
          '</div>' +
          '<div class="achievement-meta">' +
            '<span class="achievement-state"><i data-lucide="' + stateIcon + '"></i>' + stateText + '</span>' +
            '<span class="achievement-xp"><i data-lucide="sparkles"></i> +' + Number(achievement.xp_reward || 0) + ' XP</span>' +
          '</div>' +
        '</div>';
      }).join('');
      lucide.createIcons({ node: container });
    }

    function renderAchievementsError() {
      const container = document.getElementById('achievementsGrid');
      container.innerHTML = '<div class="empty-state"><i data-lucide="circle-alert"></i><p>Achievements could not load right now.</p></div>';
      lucide.createIcons({ node: container });
    }

    function getIcon(achievement) {
      if (achievement.is_secret && !achievement.earned) return 'lock-keyhole';
      if (achievement.icon && /^[a-z0-9-]+$/i.test(achievement.icon)) return achievement.icon;
      return achievementIcons[achievement.achievement_key] || achievementIcons.default;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    let achievementCheckDone = false;
    async function checkNewAchievements() {
      if (achievementCheckDone) return;
      achievementCheckDone = true;
      try {
        const response = await api.post('/achievements/check');
        const newlyEarned = Array.isArray(response.data)
          ? response.data
          : (response.data && (response.data.newly_earned || response.data.newlyEarnedAchievements)) || [];
        if (response.success && newlyEarned.length > 0) {
          showAchievementUnlock(newlyEarned[0]);
          loadAchievements();
        }
      } catch (error) {
        console.error('Error checking achievements:', error);
      }
    }

    function showAchievementUnlock(achievement) {
      const overlay = document.createElement('div');
      overlay.className = 'achievement-unlock-overlay';
      overlay.innerHTML = '<div class="achievement-unlock-card">' +
        '<div class="achievement-unlock-icon"><i data-lucide="party-popper"></i></div>' +
        '<div class="achievement-unlock-kicker">Achievement unlocked</div>' +
        '<h2>' + escapeHtml(achievement.name) + '</h2>' +
        '<p>' + escapeHtml(achievement.description) + '</p>' +
        '<div class="achievement-unlock-xp">+' + Number(achievement.xp_reward || 0) + ' XP</div>' +
      '</div>';
      document.body.appendChild(overlay);
      lucide.createIcons({ node: overlay });
      overlay.addEventListener('click', function() { overlay.remove(); });
      setTimeout(function() { overlay.remove(); }, 5000);
    }

    setTimeout(checkNewAchievements, 1000);

  </script>
</body>
</html>
