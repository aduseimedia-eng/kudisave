<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#033036">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="manifest" href="../manifest.json">
  <title>Welcome - KudiSave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #033036;
      --primary-soft: #0b737d;
      --accent: #fcd116;
      --surface: #ffffff;
      --surface-soft: #f5f8f7;
      --text: #102427;
      --muted: #68787b;
      --border: rgba(3, 48, 54, 0.1);
      --shadow: 0 22px 60px rgba(3, 48, 54, 0.16);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, #f6fbfa 0%, #ecf5f3 48%, #ddebe8 100%);
    }

    .onboarding-screen {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 22px;
      padding: calc(22px + env(safe-area-inset-top, 0px)) 20px calc(18px + env(safe-area-inset-bottom, 0px));
      max-width: 1180px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 46px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--primary);
      text-decoration: none;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      background: var(--primary);
      box-shadow: 0 12px 24px rgba(3, 48, 54, 0.18);
    }

    .brand-mark i {
      width: 21px;
      height: 21px;
    }

    .brand strong {
      display: block;
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
    }

    .brand small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .skip-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.76);
      color: var(--primary);
      min-height: 38px;
      padding: 0 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .content {
      min-height: 0;
      display: grid;
      align-items: center;
      gap: 22px;
    }

    .feature-card {
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 24px;
      display: grid;
      gap: 18px;
      min-height: 328px;
    }

    .feature-icon {
      width: 64px;
      height: 64px;
      border-radius: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      background: #fef6cd;
      box-shadow: inset 0 0 0 1px rgba(252, 209, 22, 0.42);
    }

    .feature-icon i {
      width: 30px;
      height: 30px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(11, 115, 125, 0.1);
      color: var(--primary-soft);
      font-size: 12px;
      font-weight: 850;
    }

    .eyebrow i {
      width: 14px;
      height: 14px;
    }

    .rotating-title {
      font-size: clamp(32px, 8vw, 58px);
      line-height: 1.02;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: 0;
      max-width: 720px;
      opacity: 0;
      transform: translateY(14px);
      animation: textIn 0.45s ease forwards;
    }

    .rotating-title .highlight {
      color: var(--primary-soft);
    }

    .rotating-desc {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
      font-weight: 600;
      max-width: 620px;
      opacity: 0;
      transform: translateY(12px);
      animation: textIn 0.45s 0.12s ease forwards;
    }

    @keyframes textIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .feature-card.fade-out .rotating-title,
    .feature-card.fade-out .rotating-desc,
    .feature-card.fade-out .feature-icon,
    .feature-card.fade-out .eyebrow {
      animation: textOut 0.25s ease forwards;
    }

    @keyframes textOut {
      to { opacity: 0; transform: translateY(-10px); }
    }

    .preview-panel {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .preview-item {
      min-height: 94px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--border);
      display: grid;
      align-content: space-between;
      gap: 8px;
    }

    .preview-item i {
      width: 20px;
      height: 20px;
      color: var(--primary-soft);
    }

    .preview-item strong {
      display: block;
      font-size: 18px;
      color: var(--primary);
      font-weight: 900;
      letter-spacing: 0;
    }

    .preview-item span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      line-height: 1.25;
    }

    .controls {
      display: grid;
      gap: 16px;
    }

    .progress-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .progress-dot {
      width: 9px;
      height: 9px;
      border: 0;
      border-radius: 999px;
      background: rgba(3, 48, 54, 0.2);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .progress-dot.active {
      width: 30px;
      background: var(--primary);
    }

    .get-started-btn {
      width: 100%;
      min-height: 58px;
      border: none;
      border-radius: 18px;
      background: var(--primary);
      color: #ffffff;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
      box-shadow: 0 18px 34px rgba(3, 48, 54, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .get-started-btn i {
      width: 18px;
      height: 18px;
    }

    .get-started-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 42px rgba(3, 48, 54, 0.28);
    }

    .get-started-btn:active {
      transform: scale(0.98);
    }

    .ghana-colors {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      display: flex;
      z-index: 10;
    }

    .ghana-colors span { flex: 1; }
    .ghana-colors span:nth-child(1) { background: #ce1126; }
    .ghana-colors span:nth-child(2) { background: #fcd116; }
    .ghana-colors span:nth-child(3) { background: #033036; }

    @media (max-height: 700px) {
      .onboarding-screen { gap: 14px; padding-top: calc(16px + env(safe-area-inset-top, 0px)); }
      .feature-card { min-height: 260px; padding: 20px; gap: 12px; }
      .rotating-title { font-size: 29px; }
      .rotating-desc { font-size: 14px; line-height: 1.55; }
      .preview-item { min-height: 80px; padding: 12px; }
    }

    @media (max-width: 420px) {
      .preview-panel { grid-template-columns: 1fr; }
      .preview-item {
        min-height: 62px;
        grid-template-columns: auto 1fr;
        align-items: center;
        align-content: center;
      }
      .preview-item span { display: block; }
    }

    @media (min-width: 800px) {
      body { overflow: auto; }

      .onboarding-screen {
        grid-template-rows: auto 1fr auto;
        padding-left: 36px;
        padding-right: 36px;
      }

      .content {
        grid-template-columns: minmax(0, 1.12fr) minmax(320px, 0.88fr);
        gap: 28px;
      }

      .feature-card {
        min-height: 520px;
        padding: 44px;
        align-content: center;
      }

      .preview-panel {
        grid-template-columns: 1fr;
      }

      .preview-item {
        min-height: 130px;
        padding: 22px;
        border-radius: 22px;
      }

      .controls {
        max-width: 420px;
        margin: 0 auto;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="onboarding-screen">
    <header class="topbar">
      <a class="brand" href="../index.html" aria-label="KudiSave home">
        <span class="brand-mark"><i data-lucide="wallet-cards"></i></span>
        <span>
          <strong>KudiSave</strong>
          <small>Money habits that stick</small>
        </span>
      </a>
      <button class="skip-btn" type="button" onclick="getStarted()">Skip</button>
    </header>

    <section class="content" aria-live="polite">
      <article class="feature-card" id="featureCard">
        <div class="feature-icon" id="featureIconWrap">
          <i id="featureIcon" data-lucide="wallet"></i>
        </div>
        <span class="eyebrow">
          <i data-lucide="sparkles"></i>
          <span id="slideEyebrow">Smart tracking</span>
        </span>
        <h1 class="rotating-title" id="rotatingTitle"></h1>
        <p class="rotating-desc" id="rotatingDesc"></p>
      </article>

      <aside class="preview-panel" aria-label="KudiSave preview">
        <div class="preview-item">
          <i data-lucide="receipt-text"></i>
          <div>
            <strong>Bills</strong>
            <span>Know what is due before it surprises you.</span>
          </div>
        </div>
        <div class="preview-item">
          <i data-lucide="trophy"></i>
          <div>
            <strong>Badges</strong>
            <span>Complete challenges and build level progress.</span>
          </div>
        </div>
        <div class="preview-item">
          <i data-lucide="chart-no-axes-combined"></i>
          <div>
            <strong>Reports</strong>
            <span>See where your money is going each month.</span>
          </div>
        </div>
      </aside>
    </section>

    <footer class="controls">
      <div class="progress-dots" id="progressDots" aria-label="Onboarding slides">
        <button class="progress-dot active" type="button" aria-label="Show slide 1" onclick="goToSlide(0)"></button>
        <button class="progress-dot" type="button" aria-label="Show slide 2" onclick="goToSlide(1)"></button>
        <button class="progress-dot" type="button" aria-label="Show slide 3" onclick="goToSlide(2)"></button>
      </div>
      <button class="get-started-btn" type="button" onclick="getStarted()">
        Get Started
        <i data-lucide="arrow-right"></i>
      </button>
    </footer>
  </main>

  <div class="ghana-colors" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>

  <script>
    const slides = [
      {
        icon: 'wallet',
        eyebrow: 'Smart tracking',
        title: 'Track your <span class="highlight">money</span> without stress',
        desc: 'Record income, expenses, bills, and subscriptions in one clean place so you always know what is happening.'
      },
      {
        icon: 'target',
        eyebrow: 'Goals and challenges',
        title: 'Turn saving into a <span class="highlight">daily habit</span>',
        desc: 'Start real challenges, earn badges when you complete them, and grow your level progress as you stay consistent.'
      },
      {
        icon: 'chart-no-axes-combined',
        eyebrow: 'Real reports',
        title: 'Understand your <span class="highlight">spending patterns</span>',
        desc: 'Use reports, insights, and category breakdowns to make better decisions before the month gets away from you.'
      }
    ];

    let current = 0;
    let interval;

    const titleEl = document.getElementById('rotatingTitle');
    const descEl  = document.getElementById('rotatingDesc');
    const card = document.getElementById('featureCard');
    const dots = document.querySelectorAll('.progress-dot');
    const iconEl = document.getElementById('featureIcon');
    const eyebrowEl = document.getElementById('slideEyebrow');

    function renderSlide(index, animate = true) {
      const slide = slides[index];
      const update = () => {
        current = index;
        iconEl.setAttribute('data-lucide', slide.icon);
        eyebrowEl.textContent = slide.eyebrow;
        titleEl.innerHTML = slide.title;
        descEl.textContent = slide.desc;
        dots.forEach((dot, dotIndex) => dot.classList.toggle('active', dotIndex === index));
        if (typeof lucide !== 'undefined') lucide.createIcons();

        card.classList.remove('fade-out');
        titleEl.style.animation = 'none';
        descEl.style.animation = 'none';
        void titleEl.offsetWidth;
        titleEl.style.animation = 'textIn 0.45s ease forwards';
        descEl.style.animation = 'textIn 0.45s 0.12s ease forwards';
      };

      if (!animate) {
        update();
        return;
      }

      card.classList.add('fade-out');
      setTimeout(update, 240);
    }

    function goToSlide(index) {
      clearInterval(interval);
      renderSlide(index);
      startRotation();
    }

    function startRotation() {
      interval = setInterval(() => {
        renderSlide((current + 1) % slides.length);
      }, 4200);
    }

    function getStarted() {
      localStorage.setItem('onboardingComplete', 'true');
      sessionStorage.setItem('splashShown', 'true');
      window.location.href = 'splash.html';
    }

    renderSlide(0, false);
    startRotation();
  </script>
</body>
</html>
