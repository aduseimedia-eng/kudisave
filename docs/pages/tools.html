<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Shortcuts - KudiSave</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: var(--bg-primary); padding-top: 0 !important; }
    .tools-header { position: sticky; top: 0; z-index: 20; background: rgba(255,255,255,0.95); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border-bottom: 1px solid rgba(17,24,39,0.06); padding: calc(12px + env(safe-area-inset-top, 0px)) 20px 14px; display: flex; align-items: center; gap: 12px; }
    .tools-back { width: 40px; height: 40px; border-radius: 14px; background: var(--bg-secondary); color: var(--text-primary); display: inline-flex; align-items: center; justify-content: center; text-decoration: none; border: 1px solid var(--border-color); }
    .tools-back i { width: 19px; height: 19px; }
    .tools-title { font-size: 18px; font-weight: 850; color: var(--text-primary); letter-spacing: -0.3px; }
    .tools-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 600; }
    .tools-content { padding: 18px 18px 120px; max-width: 760px; margin: 0 auto; }
    .tools-section-title { font-size: 13px; font-weight: 850; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin: 18px 2px 10px; }
    .tools-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .tool-card { min-height: 112px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 15px 10px 13px; text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 9px; text-align: center; box-shadow: 0 8px 22px rgba(17,24,39,0.045); }
    .tool-card:active { transform: scale(0.97); }
    .tool-icon { width: 44px; height: 44px; border-radius: 15px; display: inline-flex; align-items: center; justify-content: center; color: #ffffff; background: linear-gradient(135deg, #033036, #0b737d); box-shadow: 0 8px 18px rgba(3,48,54,0.18); }
    .tool-icon i { width: 21px; height: 21px; }
    .tool-label { font-size: 12px; font-weight: 800; color: var(--text-primary); line-height: 1.18; }
    .tool-hint { font-size: 10px; color: var(--text-muted); line-height: 1.2; }
    .orange { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
    .purple { background: linear-gradient(135deg, #7c3aed, #a78bfa); }
    .indigo { background: linear-gradient(135deg, #6366f1, #818cf8); }
    .green { background: linear-gradient(135deg, #10b981, #34d399); }
    .gold { background: linear-gradient(135deg, #eab308, #facc15); }
    .red { background: linear-gradient(135deg, #ef4444, #f87171); }
    .tools-currency-modal { max-width: 430px; }
    .currency-form { display: grid; gap: 14px; }
    .currency-field { display: grid; gap: 7px; }
    .currency-field label { font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .currency-row { display: grid; grid-template-columns: 1fr 120px; gap: 10px; }
    .currency-row input, .currency-row select { min-height: 48px; border: 1px solid var(--border-color); border-radius: 14px; background: var(--bg-secondary); color: var(--text-primary); padding: 0 12px; font: inherit; font-weight: 700; }
    .currency-swap { width: 44px; height: 44px; border-radius: 15px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--primary-color); display: inline-flex; align-items: center; justify-content: center; margin: -2px auto; cursor: pointer; }
    .currency-result { border-radius: 18px; padding: 16px; background: linear-gradient(135deg, rgba(3,48,54,0.08), rgba(11,115,125,0.08)); border: 1px solid rgba(3,48,54,0.12); }
    .currency-result-value { font-size: 25px; font-weight: 900; color: var(--text-primary); letter-spacing: -0.5px; }
    .currency-result-rate { margin-top: 4px; font-size: 12px; color: var(--text-muted); font-weight: 700; }
    @media (max-width: 360px) { .tools-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .currency-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="tools-header">
    <a href="dashboard.html" class="tools-back" aria-label="Back to dashboard"><i data-lucide="arrow-left"></i></a>
    <div><div class="tools-title">All Shortcuts</div><div class="tools-subtitle">Your dashboard shortcuts</div></div>
  </header>
  <main class="tools-content">
    <div class="tools-section-title">Shortcuts</div>
    <div class="tools-grid">
      <a class="tool-card" href="bills.html"><span class="tool-icon orange"><i data-lucide="calendar-check"></i></span><span class="tool-label">Bills Due</span><span class="tool-hint">Due payments</span></a>
      <a class="tool-card" href="subscriptions.html"><span class="tool-icon purple"><i data-lucide="repeat"></i></span><span class="tool-label">Subscriptions</span><span class="tool-hint">Recurring costs</span></a>
      <a class="tool-card" href="challenges.html"><span class="tool-icon indigo"><i data-lucide="swords"></i></span><span class="tool-label">Challenges</span><span class="tool-hint">Build habits</span></a>
      <a class="tool-card" href="#" onclick="openToolsCurrencyModal(); return false;"><span class="tool-icon"><i data-lucide="calculator"></i></span><span class="tool-label">Currency</span><span class="tool-hint">Convert rates</span></a>
      <a class="tool-card" href="reports.html"><span class="tool-icon green"><i data-lucide="bar-chart-3"></i></span><span class="tool-label">Reports</span><span class="tool-hint">See trends</span></a>
      <a class="tool-card" href="achievements.html"><span class="tool-icon gold"><i data-lucide="trophy"></i></span><span class="tool-label">Achievements</span><span class="tool-hint">Earn badges</span></a>
    </div>
  </main>
  <div id="toolsCurrencyModal" class="modal" onclick="if (event.target === this) closeToolsCurrencyModal()">
    <div class="modal-content tools-currency-modal">
      <div class="modal-header">
        <h2 class="modal-title"><i data-lucide="calculator" class="icon-inline"></i> Currency Converter</h2>
        <button class="close-btn" onclick="closeToolsCurrencyModal()" aria-label="Close" title="Close" type="button"><i data-lucide="x"></i></button>
      </div>
      <div class="currency-form">
        <div class="currency-field">
          <label for="toolsCurrencyAmount">Amount</label>
          <div class="currency-row">
            <input id="toolsCurrencyAmount" type="number" inputmode="decimal" min="0" value="1" oninput="convertToolsCurrency()">
            <select id="toolsFromCurrency" onchange="convertToolsCurrency()">
              <option value="GHS">GHS</option><option value="USD">USD</option><option value="EUR">EUR</option><option value="GBP">GBP</option><option value="NGN">NGN</option>
            </select>
          </div>
        </div>
        <button class="currency-swap" onclick="swapToolsCurrencies()" type="button" aria-label="Swap currencies"><i data-lucide="arrow-up-down"></i></button>
        <div class="currency-field">
          <label for="toolsToCurrency">Convert to</label>
          <div class="currency-row">
            <input id="toolsCurrencyOutput" type="text" readonly value="0.00">
            <select id="toolsToCurrency" onchange="convertToolsCurrency()">
              <option value="USD">USD</option><option value="GHS">GHS</option><option value="EUR">EUR</option><option value="GBP">GBP</option><option value="NGN">NGN</option>
            </select>
          </div>
        </div>
        <div class="currency-result">
          <div class="currency-result-value" id="toolsCurrencyResult">USD 0.00</div>
          <div class="currency-result-rate" id="toolsCurrencyRate">1 GHS = 0.07 USD</div>
        </div>
      </div>
    </div>
  </div>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js?v=notify3"></script>
  <script>
    const toolsCurrencyRates = { GHS: 1, USD: 0.074, EUR: 0.068, GBP: 0.058, NGN: 112.5 };
    const toolsCurrencyNames = { GHS: 'Ghana Cedi', USD: 'US Dollar', EUR: 'Euro', GBP: 'British Pound', NGN: 'Nigerian Naira' };
    function openToolsCurrencyModal() {
      const modal = document.getElementById('toolsCurrencyModal');
      if (!modal) return;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
      convertToolsCurrency();
      if (typeof lucide !== 'undefined') lucide.createIcons({ node: modal });
    }
    function closeToolsCurrencyModal() {
      const modal = document.getElementById('toolsCurrencyModal');
      if (!modal) return;
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }
    function convertToolsCurrency() {
      const amount = parseFloat(document.getElementById('toolsCurrencyAmount').value) || 0;
      const from = document.getElementById('toolsFromCurrency').value;
      const to = document.getElementById('toolsToCurrency').value;
      const converted = (amount / toolsCurrencyRates[from]) * toolsCurrencyRates[to];
      const rate = toolsCurrencyRates[to] / toolsCurrencyRates[from];
      document.getElementById('toolsCurrencyOutput').value = converted.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      document.getElementById('toolsCurrencyResult').textContent = `${to} ${converted.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      document.getElementById('toolsCurrencyRate').textContent = `1 ${from} = ${rate < 1 ? rate.toFixed(4) : rate.toFixed(2)} ${to} · ${toolsCurrencyNames[to]}`;
    }
    function swapToolsCurrencies() {
      const from = document.getElementById('toolsFromCurrency');
      const to = document.getElementById('toolsToCurrency');
      const nextFrom = to.value;
      to.value = from.value;
      from.value = nextFrom;
      convertToolsCurrency();
    }
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') closeToolsCurrencyModal();
    });
    lucide.createIcons();
  </script>
</body>
</html>
