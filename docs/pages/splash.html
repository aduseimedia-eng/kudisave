<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#006B3F">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="manifest" href="../manifest.json">
  <title>KudiSave</title>
  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- Cal Sans -->
  <style>@font-face { font-family: 'Cal Sans'; src: url('https://cdn.jsdelivr.net/npm/cal-sans@1.0.1/fonts/CalSans-SemiBold.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }</style>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #006B3F;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #006B3F;
      padding: max(28px, env(safe-area-inset-top)) 24px max(28px, env(safe-area-inset-bottom));
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.08), transparent 36%);
    }

    .splash-container {
      text-align: center;
      width: min(100%, 360px);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.65s ease both;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px) scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    .splash-logo {
      width: min(72vw, 280px);
      margin-bottom: -20px;
    }

    .splash-logo-img {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 14px 28px rgba(0, 31, 20, 0.2));
    }

    .splash-title {
      font-family: 'Cal Sans', sans-serif;
      font-size: clamp(34px, 9vw, 46px);
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: 0;
      line-height: 1;
    }

    .splash-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.82);
      margin-bottom: 24px;
      font-weight: 600;
      line-height: 1.5;
    }

    .splash-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 20px;
    }

    .splash-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #ffffff;
      opacity: 0.35;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .splash-dot:nth-child(2) {
      animation-delay: 0.16s;
    }

    .splash-dot:nth-child(3) {
      animation-delay: 0.32s;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.82); opacity: 0.35; }
      50% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 380px) {
      .splash-logo {
        width: min(76vw, 230px);
        margin-bottom: -16px;
      }

      .splash-subtitle {
        font-size: 13px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }


  </style>
</head>
<body>
  <div class="splash-container">
    <div class="splash-logo"><img src="../Secondary_Logo.png" alt="KudiSave" class="splash-logo-img"></div>
    <h1 class="splash-title">KudiSave</h1>
    <p class="splash-subtitle">Getting things ready</p>
    <div class="splash-loader">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>

  <script>
    // Check if user has completed onboarding and is logged in
    const hasCompletedOnboarding = localStorage.getItem('onboardingComplete');
    const isLoggedIn = localStorage.getItem('token');
    
    // Mark splash screen as shown
    sessionStorage.setItem('splashShown', 'true');

    function getRedirectUrl() {
      if (isLoggedIn) {
        return 'dashboard.html';
      } else if (!hasCompletedOnboarding) {
        return 'onboarding.html';
      } else {
        return '../index.html';
      }
    }

    // Wait briefly then redirect based on user state
    setTimeout(() => {
      window.location.href = getRedirectUrl();
    }, 1600);
    
    // Allow skip with tap/click
    document.addEventListener('click', skipSplash);
    document.addEventListener('touchstart', skipSplash);
    
    let skipped = false;
    function skipSplash() {
      if (!skipped) {
        skipped = true;
        window.location.href = getRedirectUrl();
      }
    }
  </script>
</body>
</html>
