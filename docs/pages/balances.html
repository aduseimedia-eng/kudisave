<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#033036">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="manifest" href="../manifest.json">
  <title>Balances - KudiSave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css?v=loading2">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      min-height: 100vh;
      padding-top: 0 !important;
      background: #111318 !important;
      color: #f8fafc;
    }

    [data-theme="light"] body {
      background: #f5f6fa !important;
      color: #111827;
    }

    .balances-shell {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: calc(18px + env(safe-area-inset-top, 0px)) 16px calc(92px + env(safe-area-inset-bottom, 0px));
    }

    .balances-topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      margin-bottom: 26px;
    }

    .balances-back,
    .balances-save {
      border: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: inherit;
    }

    .balances-back {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      color: #f8fafc;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
    }

    [data-theme="light"] .balances-back {
      color: #033036;
      background: #ffffff;
      border-color: rgba(17,24,39,0.06);
      box-shadow: 0 10px 24px rgba(17,24,39,0.06);
    }

    .balances-back i,
    .balances-save i,
    .history-link i {
      width: 19px;
      height: 19px;
    }

    .balance-kicker {
      color: #8b8f9b;
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    [data-theme="light"] .balance-kicker {
      color: #6b7280;
    }

    .balance-total {
      font-size: clamp(30px, 4rem, 54px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -1px;
      color: #ffffff;
      margin-bottom: 30px;
    }

    [data-theme="light"] .balance-total {
      color: #111827;
    }

    .section-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 14px;
    }

    .section-title {
      margin: 0;
      color: #ffffff;
      font-size: clamp(28px, 3.25rem, 46px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -1px;
    }

    [data-theme="light"] .section-title {
      color: #111827;
    }

    .card-count,
    .history-link,
    .add-account-button,
    .account-modal-close,
    .account-modal-cancel,
    .account-modal-save {
      color: #8b8f9b;
      font-size: 14px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      border: 0;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    .card-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .add-account-button {
      min-height: 38px;
      padding: 0 12px;
      border-radius: 12px;
      color: #f8fafc;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      gap: 6px;
    }

    [data-theme="light"] .add-account-button {
      color: #033036;
      background: #ffffff;
      border-color: rgba(17,24,39,0.08);
    }

    .add-account-button i {
      width: 17px;
      height: 17px;
    }

    .balance-cards {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(82vw, 420px);
      gap: 18px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 8px 7px 30px;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
    }

    .balance-cards::-webkit-scrollbar {
      display: none;
    }

    .wallet-card {
      min-height: clamp(340px, 48vh, 470px);
      border: 0;
      border-radius: 22px;
      padding: 26px 26px 24px;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      color: #ffffff;
      display: grid;
      align-content: space-between;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
      position: relative;
      overflow: hidden;
      background: #292b37;
      box-shadow: none;
      transform: translateZ(0) scale(0.985);
      transition: transform 0.34s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.34s ease, filter 0.34s ease, opacity 0.34s ease;
    }

    .wallet-card.active {
      outline: 2px solid rgba(255,255,255,0.72);
      outline-offset: 3px;
      transform: translateY(-2px) scale(1);
      box-shadow: 0 24px 64px rgba(0,0,0,0.24);
    }

    .wallet-card:active {
      transform: scale(0.975);
    }

    @media (hover: hover) {
      .wallet-card:hover {
        transform: translateY(-4px) scale(1);
        filter: saturate(1.04);
      }
    }

    .wallet-card.visa {
      background: #2d70f6;
    }

    .wallet-card.mastercard {
      background: #292b37;
    }

    .wallet-card.cash {
      background: #0f766e;
    }

    .wallet-card.bank {
      background: #334155;
    }

    .wallet-card.mtn {
      background: #f4c430;
      color: #111827;
    }

    .wallet-card.telecel {
      background: #d71920;
    }

    .wallet-card.airtel {
      background: linear-gradient(135deg, #e4002b, #005baa);
    }

    .wallet-card-top,
    .wallet-card-bottom {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .wallet-brand {
      min-height: clamp(142px, 23vh, 220px);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex: 1;
      min-width: 0;
    }

    .wallet-brand img {
      width: min(260px, 84%);
      max-height: clamp(128px, 21vh, 200px);
      object-fit: contain;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,0.18));
      transform: translateZ(0);
      transition: transform 0.38s cubic-bezier(0.16, 1, 0.3, 1), filter 0.38s ease;
    }

    .wallet-card.cash .wallet-brand img,
    .wallet-card.bank .wallet-brand img,
    .wallet-card.telecel .wallet-brand img,
    .wallet-card.mastercard .wallet-brand img {
      width: min(248px, 82%);
      max-height: clamp(122px, 20vh, 190px);
    }

    .wallet-card.mtn .wallet-brand img {
      width: min(252px, 82%);
      max-height: clamp(124px, 20vh, 192px);
    }

    .wallet-card.active .wallet-brand img,
    .wallet-card:hover .wallet-brand img {
      transform: scale(1.045);
      filter: drop-shadow(0 22px 36px rgba(0,0,0,0.22));
    }

    .wallet-chip {
      width: 48px;
      height: 38px;
      border-radius: 9px;
      background: rgba(255,255,255,0.18);
      display: grid;
      place-items: center;
      color: currentColor;
    }

    .wallet-chip i {
      width: 20px;
      height: 20px;
    }

    .wallet-amount {
      margin: 12px 0 5px;
      font-size: clamp(31px, 3rem, 42px);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.7px;
    }

    .wallet-name {
      font-size: 15px;
      font-weight: 800;
      color: rgba(255,255,255,0.72);
    }

    .wallet-card.mtn .wallet-name {
      color: rgba(17,24,39,0.62);
    }

    .wallet-meta-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      font-weight: 800;
      color: rgba(255,255,255,0.42);
      margin-bottom: 4px;
    }

    .wallet-card.mtn .wallet-meta-label {
      color: rgba(17,24,39,0.44);
    }

    .wallet-meta-value,
    .wallet-history-count {
      font-size: 14px;
      font-weight: 850;
      color: rgba(255,255,255,0.76);
    }

    .wallet-card.mtn .wallet-meta-value,
    .wallet-card.mtn .wallet-history-count {
      color: rgba(17,24,39,0.68);
    }

    .wallet-edit {
      margin-top: 14px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      color: currentColor;
    }

    .wallet-edit span {
      font-size: 12px;
      font-weight: 900;
    }

    .wallet-edit input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: currentColor;
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      text-align: right;
      min-width: 0;
    }

    .wallet-edit input::placeholder {
      color: currentColor;
      opacity: 0.52;
    }

    .balances-save {
      width: 100%;
      min-height: 56px;
      border-radius: 18px;
      color: #ffffff;
      background: linear-gradient(135deg, #033036, #0b737d);
      font-size: 15px;
      font-weight: 900;
      gap: 8px;
      box-shadow: 0 16px 34px rgba(3,48,54,0.28);
      margin: 0 0 26px;
    }

    .transactions-panel {
      margin-top: 4px;
    }

    .transactions-list {
      display: grid;
      gap: 0;
      background: transparent;
    }

    .transaction-row {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 14px;
      align-items: center;
      min-height: 76px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    [data-theme="light"] .transaction-row {
      border-bottom-color: rgba(17,24,39,0.08);
    }

    .transaction-icon {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #303342;
      color: #f8fafc;
      display: grid;
      place-items: center;
    }

    [data-theme="light"] .transaction-icon {
      background: #e5e7eb;
      color: #033036;
    }

    .transaction-icon i {
      width: 20px;
      height: 20px;
    }

    .transaction-title {
      color: #f8fafc;
      font-size: 15px;
      font-weight: 850;
      margin-bottom: 3px;
    }

    [data-theme="light"] .transaction-title {
      color: #111827;
    }

    .transaction-meta {
      color: #8b8f9b;
      font-size: 13px;
      font-weight: 700;
    }

    .transaction-amount {
      color: #f8fafc;
      font-size: 17px;
      font-weight: 900;
      white-space: nowrap;
    }

    [data-theme="light"] .transaction-amount {
      color: #111827;
    }

    .empty-history {
      padding: 36px 18px;
      border-radius: 18px;
      text-align: center;
      color: #8b8f9b;
      background: rgba(255,255,255,0.04);
      font-size: 14px;
      font-weight: 700;
    }

    [data-theme="light"] .empty-history {
      background: #ffffff;
      color: #6b7280;
      box-shadow: 0 10px 24px rgba(17,24,39,0.05);
    }

    .account-modal {
      position: fixed;
      inset: 0;
      z-index: 2400;
      display: grid;
      place-items: end center;
      padding: 16px;
      background: rgba(5,10,18,0.62);
      backdrop-filter: blur(12px);
    }

    .account-modal[hidden] {
      display: none;
    }

    .account-modal-panel {
      width: min(100%, 460px);
      border-radius: 22px;
      padding: 20px;
      background: #171a22;
      color: #f8fafc;
      box-shadow: 0 28px 80px rgba(0,0,0,0.36);
    }

    [data-theme="light"] .account-modal-panel {
      background: #ffffff;
      color: #111827;
    }

    .account-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .account-modal-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 900;
      color: inherit;
    }

    .account-modal-close {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      justify-content: center;
      color: inherit;
      background: rgba(255,255,255,0.08);
    }

    [data-theme="light"] .account-modal-close {
      background: #f3f4f6;
    }

    .account-modal-close i {
      width: 18px;
      height: 18px;
    }

    .account-form {
      display: grid;
      gap: 14px;
    }

    .account-field {
      display: grid;
      gap: 7px;
    }

    .account-field label {
      color: #8b8f9b;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .account-field input,
    .account-field select {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 0 14px;
      color: inherit;
      background: rgba(255,255,255,0.06);
      font: inherit;
      font-weight: 800;
      outline: 0;
    }

    [data-theme="light"] .account-field input,
    [data-theme="light"] .account-field select {
      border-color: rgba(17,24,39,0.08);
      background: #f9fafb;
    }

    .account-modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .account-modal-cancel,
    .account-modal-save {
      min-height: 50px;
      justify-content: center;
      border-radius: 14px;
      gap: 8px;
    }

    .account-modal-cancel {
      color: inherit;
      background: rgba(255,255,255,0.08);
    }

    [data-theme="light"] .account-modal-cancel {
      background: #f3f4f6;
    }

    .account-modal-save {
      color: #ffffff;
      background: #033036;
    }

    @media (min-width: 760px) {
      .balances-shell {
        padding-inline: 28px;
      }

      .balances-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) minmax(340px, 0.92fr);
        gap: 34px;
        align-items: start;
      }

      .balance-cards {
        grid-auto-columns: minmax(380px, 460px);
      }

      .transactions-panel {
        position: sticky;
        top: 24px;
      }
    }

    @media (min-width: 1100px) {
      body {
        overflow-x: hidden;
      }

      .balances-shell {
        width: min(100%, 1380px);
        padding: calc(28px + env(safe-area-inset-top, 0px)) 34px 54px;
      }

      .balances-topbar {
        margin-bottom: 22px;
      }

      .balances-grid {
        grid-template-columns: minmax(0, 820px) minmax(390px, 460px);
        gap: 54px;
      }

      .balance-kicker {
        font-size: 14px;
      }

      .balance-total {
        font-size: 58px;
        margin-bottom: 34px;
      }

      .section-row {
        margin-bottom: 18px;
      }

      .section-title {
        font-size: 44px;
      }

      .card-actions {
        gap: 12px;
      }

      .add-account-button {
        min-height: 42px;
        padding-inline: 15px;
      }

      .balance-cards {
        grid-auto-columns: minmax(540px, 600px);
        gap: 22px;
        padding: 10px 160px 34px 6px;
        scrollbar-width: thin;
        scrollbar-color: rgba(148,163,184,0.45) transparent;
      }

      .balance-cards::-webkit-scrollbar {
        display: block;
        height: 8px;
      }

      .balance-cards::-webkit-scrollbar-track {
        background: transparent;
      }

      .balance-cards::-webkit-scrollbar-thumb {
        background: rgba(148,163,184,0.45);
        border-radius: 999px;
      }

      .wallet-card {
        min-height: min(58vh, 560px);
        padding: 34px 34px 30px;
        border-radius: 24px;
      }

      .wallet-card.active {
        outline-offset: 4px;
      }

      .wallet-brand {
        min-height: 250px;
      }

      .wallet-brand img {
        width: min(340px, 88%);
        max-height: 232px;
      }

      .wallet-card.cash .wallet-brand img,
      .wallet-card.bank .wallet-brand img,
      .wallet-card.telecel .wallet-brand img,
      .wallet-card.mastercard .wallet-brand img,
      .wallet-card.mtn .wallet-brand img {
        width: min(320px, 86%);
        max-height: 220px;
      }

      .wallet-chip {
        width: 54px;
        height: 42px;
      }

      .wallet-amount {
        font-size: 44px;
        margin-top: 16px;
      }

      .wallet-name {
        font-size: 16px;
      }

      .wallet-edit {
        margin-top: 18px;
        padding: 10px 12px;
      }

      .balances-save {
        width: min(100%, 420px);
        margin-left: auto;
        margin-bottom: 0;
      }

      .transactions-panel {
        top: 32px;
        min-height: calc(100vh - 64px);
        padding-left: 26px;
        border-left: 1px solid rgba(255,255,255,0.08);
      }

      [data-theme="light"] .transactions-panel {
        border-left-color: rgba(17,24,39,0.08);
      }

      .transactions-panel .section-title {
        font-size: 34px !important;
      }

      .transactions-list {
        max-height: calc(100vh - 170px);
        overflow-y: auto;
        padding-right: 8px;
        scrollbar-width: thin;
        scrollbar-color: rgba(148,163,184,0.45) transparent;
      }

      .transaction-row {
        min-height: 84px;
      }

      .account-modal {
        place-items: center;
      }
    }
  </style>
</head>
<body>
  <main class="balances-shell">
    <div class="balances-topbar">
      <a class="balances-back" href="dashboard.html" aria-label="Back to dashboard"><i data-lucide="arrow-left"></i></a>
    </div>

    <div class="balances-grid">
      <section class="balances-primary">
        <div class="balance-kicker">Total Balance</div>
        <div class="balance-total" id="balancesPageTotal">GHS 0.00</div>

        <div class="section-row">
          <h1 class="section-title">Cards</h1>
          <div class="card-actions">
            <button class="add-account-button" type="button" onclick="openAddAccountModal()"><i data-lucide="plus"></i> Add</button>
            <button class="card-count" type="button" onclick="selectAccount('all')"><span id="methodCount">0</span><i data-lucide="chevron-right"></i></button>
          </div>
        </div>

        <form id="balancesPageForm" onsubmit="saveBalancesPage(event)">
          <div class="balance-cards" id="balanceCards">
            <div class="empty-history">Loading balances...</div>
          </div>
          <button class="balances-save" type="submit"><i data-lucide="check-circle"></i> Save Balances</button>
        </form>
      </section>

      <section class="transactions-panel">
        <div class="section-row">
          <h2 class="section-title" style="font-size:clamp(26px,2.6rem,38px)">Last Transactions</h2>
          <button class="history-link" type="button" onclick="selectAccount('all')"><span id="historyFilterLabel">All</span><i data-lucide="chevron-right"></i></button>
        </div>
        <div class="transactions-list" id="transactionsList">
          <div class="empty-history">Loading transactions...</div>
        </div>
      </section>
    </div>
  </main>

  <div class="account-modal" id="accountModal" hidden>
    <form class="account-modal-panel" id="accountForm" onsubmit="addBalanceAccount(event)">
      <div class="account-modal-head">
        <h2 class="account-modal-title">Add payment method</h2>
        <button class="account-modal-close" type="button" onclick="closeAddAccountModal()" aria-label="Close"><i data-lucide="x"></i></button>
      </div>
      <div class="account-form">
        <div class="account-field">
          <label for="accountPaymentMethod">Payment method</label>
          <select id="accountPaymentMethod" required></select>
        </div>
        <div class="account-field">
          <label for="accountName">Account name</label>
          <input id="accountName" type="text" maxlength="80" placeholder="Freelance Visa" required>
        </div>
        <div class="account-field">
          <label for="accountMask">Last four</label>
          <input id="accountMask" type="text" inputmode="numeric" maxlength="4" placeholder="6754">
        </div>
        <div class="account-field">
          <label for="accountStartingBalance">Balance</label>
          <input id="accountStartingBalance" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00">
        </div>
        <div class="account-modal-actions">
          <button class="account-modal-cancel" type="button" onclick="closeAddAccountModal()">Cancel</button>
          <button class="account-modal-save" type="submit"><i data-lucide="plus"></i> Add account</button>
        </div>
      </div>
    </form>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/api.js?v=balances3"></script>
  <script src="../assets/js/utils.js?v=loading2"></script>
  <script>
    utils.requireAuth();

    const BALANCE_METHODS = [
      { account_type: 'Visa Card', payment_method: 'Visa Card', label: 'Visa', name: 'Visa Card', mask: '6754', image: '../assets/Images/Visa%20Card.png', tone: 'visa', chip: 'credit-card' },
      { account_type: 'Mastercard', payment_method: 'Mastercard', label: 'Mastercard', name: 'Mastercard', mask: '3521', image: '../assets/Images/mastercard.png', tone: 'mastercard', chip: 'credit-card' },
      { account_type: 'MTN MoMo', payment_method: 'MTN MoMo', label: 'MTN MoMo', name: 'MTN MoMo', mask: '2409', image: '../assets/Images/mtnmomo.png', tone: 'mtn', chip: 'smartphone' },
      { account_type: 'Telecel Cash', payment_method: 'Telecel Cash', label: 'Telecel', name: 'Telecel Cash', mask: '1842', image: '../assets/Images/TelecelCash.png', tone: 'telecel', chip: 'smartphone' },
      { account_type: 'Bank', payment_method: 'Bank Transfer', label: 'Bank', name: 'Bank Transfer', mask: '4217', image: '../assets/Images/Bank%20Transfer.png', tone: 'bank', chip: 'landmark' },
      { account_type: 'Cash', payment_method: 'Cash', label: 'Cash', name: 'Cash', mask: '0000', image: '../assets/Images/cash.png', tone: 'cash', chip: 'banknote' },
      { account_type: 'AirtelTigo Money', payment_method: 'AirtelTigo Money', label: 'AT Money', name: 'AirtelTigo Money', mask: '2026', image: '', tone: 'airtel', chip: 'smartphone' }
    ];

    let balancesState = [];
    let expensesState = [];
    let selectedAccountKey = 'all';

    function escapeText(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function normalizePaymentMethod(value) {
      const raw = String(value || '').trim().toLowerCase();
      if (!raw) return 'Cash';
      if (raw.includes('mastercard') || raw.includes('master card')) return 'Mastercard';
      if (raw.includes('visa') || raw === 'card' || raw.includes('credit card') || raw.includes('debit card')) return 'Visa Card';
      if (raw.includes('mtn') || raw.includes('momo')) return 'MTN MoMo';
      if (raw.includes('telecel') || raw.includes('vodafone')) return 'Telecel Cash';
      if (raw.includes('bank')) return 'Bank Transfer';
      if (raw.includes('airteltigo') || raw.includes('airtel tigo')) return 'AirtelTigo Money';
      if (raw.includes('cash')) return 'Cash';
      return value || 'Cash';
    }

    function getAccountTypeFromPayment(paymentMethod) {
      const normalized = normalizePaymentMethod(paymentMethod);
      return normalized === 'Bank Transfer' ? 'Bank' : normalized;
    }

    function slugifyAccountKey(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 96);
    }

    function normalizeMask(value) {
      return String(value || '').replace(/\D/g, '').slice(-4);
    }

    function getTemplateByPayment(paymentMethod) {
      const normalized = normalizePaymentMethod(paymentMethod);
      return BALANCE_METHODS.find(method => method.payment_method === normalized)
        || BALANCE_METHODS.find(method => method.account_type === normalized)
        || BALANCE_METHODS[BALANCE_METHODS.length - 1];
    }

    function getDefaultAccount(method) {
      return {
        account_key: `default-${slugifyAccountKey(method.account_type)}`,
        account_type: method.account_type,
        account_name: method.name,
        payment_method: method.payment_method,
        account_mask: method.mask,
        amount: 0,
        updated_at: null
      };
    }

    function normalizeBalanceItem(item, index = 0) {
      const paymentMethod = normalizePaymentMethod(item.payment_method || item.paymentMethod || item.account_type || item.accountType);
      const accountType = getAccountTypeFromPayment(paymentMethod);
      const accountName = String(item.account_name || item.accountName || item.name || paymentMethod).trim() || paymentMethod;
      const fallbackKey = item.account_type || item.accountType
        ? `default-${slugifyAccountKey(accountType)}`
        : `${slugifyAccountKey(paymentMethod)}-${slugifyAccountKey(accountName)}-${index + 1}`;
      const amount = Number(item.amount || 0);

      return {
        account_key: slugifyAccountKey(item.account_key || item.accountKey || fallbackKey),
        account_type: accountType,
        account_name: accountName,
        payment_method: paymentMethod,
        account_mask: normalizeMask(item.account_mask || item.accountMask || item.mask),
        amount: Number.isFinite(amount) && amount >= 0 ? amount : 0,
        updated_at: item.updated_at || null
      };
    }

    function getBalanceAccounts() {
      const byKey = new Map();

      balancesState.forEach((item, index) => {
        const normalized = normalizeBalanceItem(item, index);
        if (normalized.account_key) byKey.set(normalized.account_key, normalized);
      });

      BALANCE_METHODS.forEach(method => {
        const account = getDefaultAccount(method);
        if (!byKey.has(account.account_key)) byKey.set(account.account_key, account);
      });

      return Array.from(byKey.values()).sort((a, b) => {
        const aOrder = BALANCE_METHODS.findIndex(method => method.payment_method === a.payment_method);
        const bOrder = BALANCE_METHODS.findIndex(method => method.payment_method === b.payment_method);
        if (aOrder !== bOrder) return aOrder - bOrder;
        if (a.account_key.startsWith('default-') !== b.account_key.startsWith('default-')) {
          return a.account_key.startsWith('default-') ? -1 : 1;
        }
        return a.account_name.localeCompare(b.account_name);
      });
    }

    function getSelectedAccount() {
      return getBalanceAccounts().find(account => account.account_key === selectedAccountKey) || null;
    }

    function getMethodHistory(method) {
      const normalized = normalizePaymentMethod(method);
      return expensesState.filter(expense => normalizePaymentMethod(expense.payment_method) === normalized);
    }

    function getAllHistory() {
      return expensesState.slice().sort((a, b) => new Date(b.expense_date || b.date || b.created_at) - new Date(a.expense_date || a.date || a.created_at));
    }

    function updateTotalFromInputs() {
      const total = Array.from(document.querySelectorAll('.wallet-balance-input')).reduce((sum, input) => {
        const value = Number(input.value || 0);
        return sum + (Number.isFinite(value) ? value : 0);
      }, 0);
      document.getElementById('balancesPageTotal').textContent = utils.formatCurrency(total);
    }

    function renderCards() {
      const container = document.getElementById('balanceCards');
      const accounts = getBalanceAccounts();
      document.getElementById('methodCount').textContent = accounts.length;

      container.innerHTML = accounts.map(account => {
        const method = getTemplateByPayment(account.payment_method);
        const amount = Number(account.amount || 0);
        const historyCount = getMethodHistory(account.payment_method).length;
        const activeClass = selectedAccountKey === account.account_key ? ' active' : '';
        const mask = normalizeMask(account.account_mask) || method.mask;
        const imageHtml = method.image
          ? `<img src="${method.image}" alt="${escapeText(method.name)}">`
          : `<span style="font-size:24px;font-weight:900;">AT</span>`;

        return `
          <article class="wallet-card ${method.tone}${activeClass}" tabindex="0" role="button" onclick="selectAccount('${account.account_key}')" onkeydown="if(event.key === 'Enter' || event.key === ' ') { event.preventDefault(); selectAccount('${account.account_key}'); }">
            <span>
              <span class="wallet-card-top">
                <span class="wallet-brand">${imageHtml}</span>
                <span class="wallet-chip"><i data-lucide="${method.chip}"></i></span>
              </span>
              <span class="wallet-amount">${utils.formatCurrency(amount)}</span>
              <span class="wallet-name">${escapeText(account.account_name)}</span>
            </span>
            <span>
              <span class="wallet-card-bottom">
                <span>
                  <span class="wallet-meta-label">Account</span>
                  <span class="wallet-meta-value">${mask ? `**** ${mask}` : escapeText(method.label)}</span>
                </span>
                <span>
                  <span class="wallet-meta-label">History</span>
                  <span class="wallet-history-count">${historyCount}</span>
                </span>
              </span>
              <span class="wallet-edit" onclick="event.stopPropagation()">
                <span>${utils.getCurrencySymbol()}</span>
                <input class="wallet-balance-input" data-account-key="${account.account_key}" data-account-type="${account.account_type}" data-account-name="${escapeText(account.account_name)}" data-payment-method="${account.payment_method}" data-account-mask="${mask}" type="number" min="0" step="0.01" inputmode="decimal" value="${amount ? amount.toFixed(2) : ''}" placeholder="0.00" oninput="updateTotalFromInputs()">
              </span>
            </span>
          </article>
        `;
      }).join('');

      updateTotalFromInputs();
      if (typeof lucide !== 'undefined') lucide.createIcons({ node: container });
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return 'Recently';
      return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + ', ' + date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    function getTransactionIcon(expense) {
      const category = String(expense.category || '').toLowerCase();
      if (category.includes('food') || category.includes('restaurant') || category.includes('cafe')) return 'utensils';
      if (category.includes('transport')) return 'car';
      if (category.includes('shopping') || category.includes('product')) return 'shopping-cart';
      if (category.includes('utility') || category.includes('bill')) return 'receipt-text';
      if (category.includes('data') || category.includes('airtime')) return 'smartphone';
      return 'arrow-down';
    }

    function renderTransactions() {
      const container = document.getElementById('transactionsList');
      const selectedAccount = getSelectedAccount();
      const selectedLabel = selectedAccountKey === 'all'
        ? 'All'
        : (selectedAccount?.account_name || selectedAccount?.payment_method || 'Account');
      document.getElementById('historyFilterLabel').textContent = selectedLabel;

      const rows = selectedAccountKey === 'all' ? getAllHistory() : getMethodHistory(selectedAccount?.payment_method);
      const visibleRows = rows.slice(0, 8);

      if (!visibleRows.length) {
        container.innerHTML = `<div class="empty-history">No purchase history yet for ${escapeText(selectedLabel)}.</div>`;
        return;
      }

      container.innerHTML = visibleRows.map(expense => {
        const title = expense.category || expense.note || 'Purchase';
        const dateValue = expense.expense_date || expense.date || expense.created_at;
        const method = normalizePaymentMethod(expense.payment_method);
        return `
          <article class="transaction-row">
            <span class="transaction-icon"><i data-lucide="${getTransactionIcon(expense)}"></i></span>
            <span>
              <span class="transaction-title">${escapeText(title)}</span>
              <span class="transaction-meta">${escapeText(method)} &bull; ${formatDate(dateValue)}</span>
            </span>
            <span class="transaction-amount">-${utils.formatCurrency(expense.amount || 0)}</span>
          </article>
        `;
      }).join('');

      if (typeof lucide !== 'undefined') lucide.createIcons({ node: container });
    }

    function selectAccount(accountKey) {
      selectedAccountKey = accountKey;
      renderCards();
      renderTransactions();
    }

    function collectBalances() {
      return Array.from(document.querySelectorAll('.wallet-balance-input')).map(input => ({
        account_key: input.dataset.accountKey,
        account_type: input.dataset.accountType,
        account_name: input.dataset.accountName,
        payment_method: input.dataset.paymentMethod,
        account_mask: input.dataset.accountMask,
        amount: Number(input.value || 0)
      }));
    }

    function populatePaymentOptions() {
      const select = document.getElementById('accountPaymentMethod');
      if (!select || select.options.length) return;
      select.innerHTML = BALANCE_METHODS.map(method => (
        `<option value="${method.payment_method}">${escapeText(method.name)}</option>`
      )).join('');
    }

    function openAddAccountModal() {
      populatePaymentOptions();
      const modal = document.getElementById('accountModal');
      const form = document.getElementById('accountForm');
      if (form) form.reset();
      if (modal) modal.hidden = false;
      setTimeout(() => document.getElementById('accountName')?.focus(), 40);
      if (typeof lucide !== 'undefined') lucide.createIcons({ node: modal });
    }

    function closeAddAccountModal() {
      const modal = document.getElementById('accountModal');
      if (modal) modal.hidden = true;
    }

    function addBalanceAccount(event) {
      event.preventDefault();
      const paymentMethod = normalizePaymentMethod(document.getElementById('accountPaymentMethod').value);
      const template = getTemplateByPayment(paymentMethod);
      const accountName = document.getElementById('accountName').value.trim();
      const accountMask = normalizeMask(document.getElementById('accountMask').value);
      const amount = Number(document.getElementById('accountStartingBalance').value || 0);

      if (!accountName) {
        utils.showAlert('Add an account name first', 'error');
        return;
      }

      if (!Number.isFinite(amount) || amount < 0) {
        utils.showAlert('Balance amounts must be zero or more', 'error');
        return;
      }

      balancesState = collectBalances();
      const existingKeys = new Set(balancesState.map(item => item.account_key));
      const baseKey = slugifyAccountKey(`${paymentMethod}-${accountName}-${accountMask || Date.now()}`);
      let accountKey = baseKey;
      let suffix = 2;
      while (existingKeys.has(accountKey)) {
        accountKey = `${baseKey}-${suffix}`;
        suffix += 1;
      }

      balancesState.push({
        account_key: accountKey,
        account_type: template.account_type,
        account_name: accountName,
        payment_method: paymentMethod,
        account_mask: accountMask,
        amount
      });

      selectedAccountKey = accountKey;
      closeAddAccountModal();
      renderCards();
      renderTransactions();
      setTimeout(() => {
        const rail = document.getElementById('balanceCards');
        if (rail) rail.scrollTo({ left: rail.scrollWidth, behavior: 'smooth' });
      }, 60);
      utils.showAlert({
        title: 'Account added',
        message: 'Save balances to update the dashboard total.',
        type: 'success'
      });
    }

    async function saveBalancesPage(event) {
      event.preventDefault();
      const balances = collectBalances();
      if (balances.some(item => !Number.isFinite(item.amount) || item.amount < 0)) {
        utils.showAlert('Balance amounts must be zero or more', 'error');
        return;
      }

      try {
        utils.showLoading('Saving balances', 'Updating your dashboard total');
        const response = await api.updateBalances(balances);
        const data = response.data || {};
        balancesState = Array.isArray(data.balances) ? data.balances : balances;
        renderCards();
        utils.showAlert({
          title: 'Balances updated',
          message: `Dashboard total is now ${utils.formatCurrency(data.total || balances.reduce((sum, item) => sum + item.amount, 0))}.`,
          type: 'success'
        });
      } catch (error) {
        utils.showAlert(error.message || 'Failed to update balances', 'error');
      } finally {
        utils.hideLoading();
      }
    }

    async function loadBalancesPage() {
      renderCards();
      renderTransactions();

      try {
        const balancesResponse = await api.getBalances();
        const balanceData = balancesResponse.data || {};
        balancesState = Array.isArray(balanceData.balances) ? balanceData.balances : [];
        renderCards();
      } catch (error) {
        console.error('Balances page error:', error);
        utils.showAlert(error.message || 'Failed to load balances', 'error');
      }

      try {
        const expensesResponse = await api.getExpenses({ limit: 500 });
        const expenseData = expensesResponse.data || {};
        expensesState = Array.isArray(expenseData.expenses) ? expenseData.expenses : (Array.isArray(expenseData) ? expenseData : []);
        renderCards();
        renderTransactions();
      } catch (error) {
        console.warn('Could not load balance history:', error);
        document.getElementById('transactionsList').innerHTML = '<div class="empty-history">Could not load purchase history.</div>';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
      loadBalancesPage();
    });
  </script>
</body>
</html>
